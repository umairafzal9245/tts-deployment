# SGLang-Omni pipeline configuration for Qwen3-TTS 0.6B (TTFT-optimized)
#
# The 0.6B model (~1.2 GB) has ~3x fewer params than 1.7B (~3.4 GB),
# so prefill is faster. Combined with torch.compile disabled, this
# gives the lowest possible time-to-first-token on a single GPU.

config_cls: Qwen3TTSPipelineConfig
model_path: Qwen/Qwen3-TTS-12Hz-0.6B-Base
relay_backend: shm

stages:
  - name: preprocessing
    process: pipeline
    factory: sglang_omni.models.qwen3_tts.stages.create_preprocessing_executor
    next: tts_engine
  - name: tts_engine
    process: pipeline
    factory: sglang_omni.models.qwen3_tts.stages.create_sglang_tts_engine_executor
    factory_args:
      dtype: bfloat16
      server_args_overrides:
        enable_torch_compile: false
        torch_compile_max_bs: 1
    gpu: 0
    next: vocoder
  - name: vocoder
    process: pipeline
    factory: sglang_omni.models.qwen3_tts.stages.create_vocoder_executor
    factory_args:
      dtype: bfloat16
      max_batch_size: 64
      max_batch_wait_ms: 5
    gpu: 0
    terminal: true
