[loggers]
keys=root,sglang_omni,uvicorn

[handlers]
keys=console,rotating_file

[formatters]
keys=json

[logger_root]
level=INFO
handlers=console,rotating_file

[logger_sglang_omni]
level=INFO
handlers=console,rotating_file
qualname=sglang_omni
propagate=0

[logger_uvicorn]
level=INFO
handlers=console,rotating_file
qualname=uvicorn
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=json
args=(sys.stdout,)

[handler_rotating_file]
class=handlers.RotatingFileHandler
level=INFO
formatter=json
args=("/data/logs/sglang_omni.json.log", "a", 104857600, 5)

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(levelname)s %(name)s %(message)s
